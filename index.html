<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Clima</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<main class="container">

    <!-- HERO (local atual) -->
    <section class="hero" id="hero" aria-live="polite">
        <div class="hero__top">
            <h2 class="hero__city" id="hero-city">Localizando...</h2>
            <div class="hero__cond" id="hero-cond">—</div>
        </div>
        <div class="hero__temp-row">
            <div class="hero__temp" id="hero-temp">--°</div>
            <div class="hero__minmax">
                <span id="hero-min">--°</span> / <span id="hero-max">--°</span>
            </div>
        </div>
        <div class="hero__meta">
            <span id="hero-humidity">Umidade: —</span>
            <span>•</span>
            <span id="hero-wind">Vento: —</span>
        </div>
    </section>

    <!-- BUSCA -->
    <form class="search" id="search-form" autocomplete="off">
        <input
                class="search__input"
                id="search-input"
                name="q"
                type="text"
                placeholder="Buscar cidade (ex.: Rio Branco)"
                aria-label="Buscar cidade"
                required
        />
        <button class="search__button" id="search-button" type="submit">Buscar</button>
    </form>

    <!-- STATUS -->
    <div class="status" id="status" role="status" aria-live="polite"></div>

    <!-- CARD de resultado por busca  -->
    <section class="card card--hidden" id="weather-card" aria-hidden="true">
        <h2 class="card__title" id="city-name">—</h2>
        <div class="card__temp-row">
            <img id="weather-icon" alt="Ícone do clima" width="64" height="64" style="display:none;" />
            <span id="weather-emoji" style="display:none;"></span>
            <div class="card__temp" id="temp">--°C</div>
        </div>
        <div class="card__desc" id="desc">—</div>
        <div class="card__extra" id="extra">Umidade: — • Vento: —</div>
    </section>

    <!-- PREVISÃO DE HOJE (abre gráfico ao clicar) -->
    <section class="card today" id="today-card" style="display:none;" role="button" tabindex="0" aria-label="Abrir gráfico com previsão dos próximos dias">
        <h3 style="margin:0 0 8px; font-size:18px;">Previsão de hoje</h3>
        <div id="today-summary" class="today__summary">—</div>
        <div style="margin-top:8px; font-size:12px; color:#94a3b8">Toque para ver o gráfico dos próximos dias</div>
    </section>

    <footer class="footer">Open-Meteo • Mateus</footer>
</main>

<script src="app.js"></script>
</body>
</html>
